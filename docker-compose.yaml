version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ocr-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ocr-frontend
    ports:
      - "8501:8501"
    restart: unless-stopped
    depends_on:
      - backend          # ← simple format, no condition
    environment:
      - API_BASE=http://backend:8000